<html lang="en">

    <meta charset="UTF-8" />

    <meta property="og:title" content="DeHub — Open Source, User Owned & Censorship Resistant Media" />

    <meta name="twitter:site" content="@DeHubApp" />
    <meta name="twitter:title" content="DeHub — Open Source, User Owned & Censorship Resistant Media" />
    <meta name="twitter:description" content="dehub.io is open source, user owned and censorship resistant media. Join the future of free speech and reach." />

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/dehub-icon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Preconnect: max 4, highest-impact origins (Lighthouse candidates sorted by est LCP savings) -->
    <link rel="preconnect" href="https://api.web3auth.io">
    <link rel="preconnect" href="https://api.dehub.io">
    <link rel="preconnect" href="https://aigxuutjaqsywioxjefr.supabase.co" crossorigin>
    <link rel="preconnect" href="https://api.web3modal.org">
    <!-- DNS prefetch for secondary origins (cheaper, no open connection kept alive) -->
    <link rel="dns-prefetch" href="https://pulse.walletconnect.org">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdn.dehub.io">

    <!-- LCP: header logo — same URL as DesktopSidebar / MobileHeader so browser discovers early -->
    <link rel="preload" as="image" href="/dehub-header-logo.png" fetchpriority="high">

    <!-- Exo font: non-blocking load (avoids @import in index.css blocking Tailwind parse / main thread) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap" />
    </noscript>

    <!-- Critical CSS — prevents white flash and CLS from unstyled root -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; width: 100%; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #root { height: 100%; min-height: 100dvh; }

      /* Boot skeleton — paints before JS, replaced when React mounts.
         Mirrors HomeShellSkeleton in src/components/app/PageSkeletons.tsx. */
      .bs-shell { display: flex; width: 100%; max-width: 80rem; margin: 0 auto; }
      .bs-bar { background: rgba(255,255,255,0.06); border-radius: 4px; }
      .bs-card { background: #18181b; border-radius: 16px; }
      .bs-feedcard { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; }

      /* Left sidebar — desktop only — mirrors DesktopSidebar exactly */
      .bs-left { display: none; }
      @media (min-width: 1024px) {
        .bs-left { display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; width: 231px; padding: 0 18px 8px; flex-shrink: 0; margin-top: -3px; }
        .bs-left-logo { display: flex; align-items: center; height: 40.6px; margin: 9px 0 15px; }
        .bs-left-nav { background: #18181b; border-radius: 16px; flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 2px; margin-top: -8.5px; }
        .bs-left-row { display: flex; align-items: center; gap: 12px; padding: 10px; }
        .bs-left-icon { width: 36px; height: 36px; border-radius: 12px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
        .bs-left-post { height: 46px; border-radius: 16px; background: rgba(255,255,255,0.06); margin-top: 12px; }
      }

      /* Right sidebar — desktop only — mirrors RightSidebar exactly */
      .bs-right { display: none; }
      @media (min-width: 1024px) {
        .bs-right { display: block; width: 288px; height: 100vh; position: sticky; top: 0; padding: 8px 16px 16px; flex-shrink: 0; }
        .bs-right-search { height: 36px; border-radius: 12px; background: rgba(255,255,255,0.06); }
        .bs-right-panel { background: #18181b; border-radius: 16px; margin-top: 11px; overflow: hidden; }
        .bs-right-tabs { display: flex; }
        .bs-right-tab { flex: 1; padding: 12px 0; display: flex; align-items: center; justify-content: center; }
        .bs-right-tab-icon { width: 20px; height: 20px; border-radius: 4px; background: rgba(255,255,255,0.06); }
        .bs-right-body { height: 400px; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .bs-right-row { display: flex; align-items: center; gap: 12px; }
        .bs-right-panel-2 { background: #18181b; border-radius: 16px; margin-top: 11.8px; overflow: hidden; }
        .bs-right-body-2 { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .bs-right-row-2 { display: flex; align-items: center; gap: 8px; }
      }

      /* Center column */
      .bs-center { flex: 1; min-width: 0; }
      .bs-tabs-wrap { padding: 4px 8px 8px; position: sticky; top: 44px; background: #000; z-index: 50; }
      @media (min-width: 1024px) { .bs-tabs-wrap { padding: 8px 12px 12px; top: 0; } }
      .bs-tabs { background: #18181b; border-radius: 12px; display: flex; }
      .bs-tab { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 12px; }
      .bs-tab-icon { width: 16px; height: 16px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .bs-feed { padding: 0 8px 8px; display: flex; flex-direction: column; gap: 12px; }
      @media (min-width: 640px) { .bs-feed { padding: 0 12px 12px; } }
      .bs-row { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; }
      .bs-av { width: 36px; height: 36px; border-radius: 6px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
      .bs-more { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.06); }
      .bs-line { height: 16px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .bs-line-sm { height: 12px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .bs-media { aspect-ratio: 16 / 9; width: 100%; border-radius: 8px; background: rgba(255,255,255,0.06); }
      .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .bs-cell { aspect-ratio: 1 / 1; border-radius: 8px; background: rgba(255,255,255,0.06); }
      .bs-actions { display: flex; align-items: center; gap: 16px; padding-top: 12px; }
      .bs-btn { height: 32px; width: 56px; border-radius: 12px; background: rgba(255,255,255,0.06); }
      .bs-btn-end { margin-left: auto; }

      .bs-pulse { animation: bsPulse 1.6s ease-in-out 3; }
      @keyframes bsPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      @media (prefers-reduced-motion: reduce) { .bs-pulse { animation: none; } }

      /* Upgrade notice banner — mirrors UpgradeNoticeBanner.tsx so it paints with first HTML */
      .bs-notice { position: fixed; top: 0; left: 0; right: 0; z-index: 100; border-bottom: 1px solid rgba(239,68,68,0.3); background: rgba(220,38,38,0.35); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); }
      .bs-notice-inner { padding: 8px 40px 8px 16px; text-align: center; font-size: 14px; font-weight: 500; color: #fff; line-height: 1.4; }
      @media (max-width: 1023px) { .bs-notice-inner { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; } }
    </style>
    <script>
      // Hide boot notice if user previously dismissed it (matches UpgradeNoticeBanner STORAGE_KEY)
      try { if (localStorage.getItem('upgrade-notice-dismissed-v3')) { document.documentElement.classList.add('bs-notice-hidden'); } } catch (e) {}
    </script>
    <style>
      .bs-notice-hidden .bs-notice { display: none; }
    </style>
