    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Preconnect: max 4, highest-impact origins (Lighthouse candidates sorted by est LCP savings) -->
    <link rel="preconnect" href="https://api.web3auth.io">
    <link rel="preconnect" href="https://api.dehub.io">
    <link rel="preconnect" href="https://pulse.walletconnect.org">
    <link rel="preconnect" href="https://api.web3modal.org">
    <!-- DNS prefetch for secondary origins (cheaper, no open connection kept alive) -->
    <link rel="dns-prefetch" href="https://aigxuutjaqsywioxjefr.supabase.co">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- LCP: header logo — same URL as DesktopSidebar / MobileHeader so browser discovers early -->
    <link rel="preload" as="image" href="/dehub-header-logo.png" fetchpriority="high">

    <!-- Exo font: non-blocking load (avoids @import in index.css blocking Tailwind parse / main thread) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap" />
    </noscript>

    <!-- Critical CSS — prevents white flash and CLS from unstyled root -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; width: 100%; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #root { height: 100%; min-height: 100dvh; }

      /* Boot skeleton — paints before any JS runs, replaced when React mounts */
      .boot-skel { padding: 8px; padding-top: 44px; display: flex; flex-direction: column; gap: 12px; max-width: 1280px; margin: 0 auto; }
      .boot-skel-stories { display: flex; gap: 16px; padding: 7px 8px 0; overflow: hidden; }
      .boot-skel-story { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
      .boot-skel-story-thumb { width: 68px; height: 68px; border-radius: 12px; background: rgba(255,255,255,0.06); }
      .boot-skel-story-label { width: 48px; height: 10px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .boot-skel-card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
      .boot-skel-row { display: flex; align-items: center; gap: 12px; }
      .boot-skel-avatar { width: 36px; height: 36px; border-radius: 6px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
      .boot-skel-line { height: 14px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .boot-skel-line-sm { height: 10px; border-radius: 4px; background: rgba(255,255,255,0.06); }
      .boot-skel-media { height: 192px; border-radius: 8px; background: rgba(255,255,255,0.06); }
      .boot-skel-actions { display: flex; gap: 16px; padding-top: 4px; }
      .boot-skel-btn { height: 32px; width: 64px; border-radius: 12px; background: rgba(255,255,255,0.06); }
      .boot-skel-pulse { animation: bootPulse 1.6s ease-in-out infinite; }
      @keyframes bootPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      @media (prefers-reduced-motion: reduce) { .boot-skel-pulse { animation: none; } }
    </style>
</head>

  <body>

v style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="boot-skel-line" style="width:112px"></div><div class="boot-skel-line-sm" style="width:64px"></div></div></div><div class="boot-skel-media"></div><div class="boot-skel-actions"><div class="boot-skel-btn"></div><div class="boot-skel-btn"></div><div class="boot-skel-btn"></div></div></div></div></div>
