<!doctype html>
<html lang="en">
  <head>
    <script type="module">
      import { Buffer } from 'buffer'
      import process from 'process'
      window.Buffer = Buffer
      window.process = process
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeHub — Open Source, User Owned Social Media</title>
    <meta name="description" content="DeHub is open source, user owned and censorship resistant media.">
    <meta name="author" content="DeHub" />
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="fCbsM2lCr6JdQuMh1uHAHwzbLC1OoXzvK-VKFnkbZnQ" />
    <!-- Canonical set per-route via Helmet (SEOHead) so each leaf route self-references -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DeHub" />
    
    
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/sztdfQvpJrbYtfeFg4pM5GVJL662/social-images/social-1780306667399-iPad_Screenshots.webp">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="628" />
    <meta property="og:url" content="https://dehub.io/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DeHubApp" />
    
    
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/sztdfQvpJrbYtfeFg4pM5GVJL662/social-images/social-1780306667399-iPad_Screenshots.webp">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/dehub-icon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Preconnect: max 4, highest-impact origins (Lighthouse candidates sorted by est LCP savings) -->
    <link rel="preconnect" href="https://api.web3auth.io">
    <link rel="preconnect" href="https://api.dehub.io">
    <link rel="preconnect" href="https://aigxuutjaqsywioxjefr.supabase.co" crossorigin>
    <link rel="preconnect" href="https://api.web3modal.org">
    <!-- DNS prefetch for secondary origins (cheaper, no open connection kept alive) -->
    <link rel="dns-prefetch" href="https://pulse.walletconnect.org">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://cdn.dehub.io">

    <!-- LCP: header logo — same URL as DesktopSidebar / MobileHeader so browser discovers early -->
    <link rel="preload" as="image" href="/dehub-header-logo.png" fetchpriority="high">

    <!-- Exo font: non-blocking load (avoids @import in index.css blocking Tailwind parse / main thread) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo:wght@400;700;900&display=swap" />
    </noscript>

    <!-- Critical CSS — prevents white flash -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; width: 100%; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #root { height: 100%; min-height: 100dvh; }
    </style>
  <meta property="og:title" content="DeHub — Open Source, User Owned Social Media">
  <meta name="twitter:title" content="DeHub — Open Source, User Owned Social Media">
  <meta property="og:description" content="DeHub is open source, user owned and censorship resistant media.">
  <meta name="twitter:description" content="DeHub is open source, user owned and censorship resistant media.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
