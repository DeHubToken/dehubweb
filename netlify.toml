# Netlify Configuration for DeHub
# This file configures build settings, redirects, and edge functions

[build]
  # Build command
  command = "npm run build"
  
  # Output directory
  publish = "dist"
  
  # Functions directory (if using serverless functions)
  functions = "netlify/functions"

# Edge Functions Configuration
[[edge_functions]]
  # Function name (matches the file in netlify/edge-functions/)
  function = "ssr-seo"
  
  # Path pattern to match (all routes)
  path = "/*"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    # NOTE: X-Frame-Options set to SAMEORIGIN (not DENY) because Web3Auth
    # uses iframes for session management. DENY blocks those iframes.
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Cross-Origin policies for Web3Auth compatibility
    # unsafe-none allows Web3Auth's cross-origin popup/redirect communication
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "cross-origin"

    # CORS headers (adjust as needed)
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't apply this redirect for actual files
  conditions = {Role = ["user"]}

# Environment variables
[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Plugin configuration (optional)
# [[plugins]]
#   package = "@netlify/plugin-lighthouse"
